name: Shiperman's Friend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Shiperman's Friend
        uses: actions/checkout@v4
        with:
          path: shipermansfriend

      - name: Checkout Stephans-KMP-Components
        uses: actions/checkout@v4
        with:
          repository: sknull/Stephans-KMP-Components
          path: Stephans-KMP-Components
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-encryption-key: ${{ secrets.Gradle_Encryption_Key }}

      - name: Decode Keystore
        if: matrix.os == 'ubuntu-latest'
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "${{ github.workspace }}/shipermansfriend/composeApp"
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | tr -d '\n ' | base64 -d > "${{ github.workspace }}/shipermansfriend/composeApp/release.keystore"

      - name: Install Linux Build Tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg xvfb

      - name: Run Tests
        if: matrix.os == 'ubuntu-latest'
        working-directory: shipermansfriend
        shell: bash
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          GITHUB_ACTOR: sknull
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"
        run: |
          chmod +x gradlew
          ./gradlew test jvmTest --no-configuration-cache

      - name: Build Binaries Only
        working-directory: shipermansfriend
        env:
          RELEASE_KEYSTORE_PASSWORD: '${{ secrets.RELEASE_KEYSTORE_PASSWORD }}'
          RELEASE_KEY_ALIAS: '${{ secrets.RELEASE_KEY_ALIAS }}'
          RELEASE_KEY_PASSWORD: '${{ secrets.RELEASE_KEY_PASSWORD }}'
          RELEASE_KEYSTORE_PATH: release.keystore
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          GITHUB_ACTOR: sknull
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            chmod +x gradlew
            xvfb-run ./gradlew packageReleaseDeb assembleRelease asciidoctorPdf --no-configuration-cache
          else
            ./gradlew packageReleaseMsi -x test --no-configuration-cache --no-daemon
          fi

      - name: Upload Intermediates
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs-${{ matrix.os }}
          path: |
            shipermansfriend/composeApp/build/compose/binaries/
            shipermansfriend/composeApp/build/outputs/apk/
            shipermansfriend/composeApp/build/distributions/
            shipermansfriend/composeApp/build/asciidoc/
          include-hidden-files: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Shiperman's Friend
        uses: actions/checkout@v4
        with:
          path: shipermansfriend

      - name: Checkout Stephans-KMP-Components
        uses: actions/checkout@v4
        with:
          repository: sknull/Stephans-KMP-Components
          path: Stephans-KMP-Components
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-encryption-key: ${{ secrets.Gradle_Encryption_Key }}

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "${{ github.workspace }}/shipermansfriend/composeApp"
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | tr -d '\n ' | base64 -d > "${{ github.workspace }}/shipermansfriend/composeApp/release.keystore"

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: shipermansfriend
          merge-multiple: true

      - name: Final Publish to GitHub Packages
        working-directory: shipermansfriend
        env:
          RELEASE_KEYSTORE_PASSWORD: '${{ secrets.RELEASE_KEYSTORE_PASSWORD }}'
          RELEASE_KEY_ALIAS: '${{ secrets.RELEASE_KEY_ALIAS }}'
          RELEASE_KEY_PASSWORD: '${{ secrets.RELEASE_KEY_PASSWORD }}'
          RELEASE_KEYSTORE_PATH: release.keystore
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          GITHUB_ACTOR: sknull
        run: |
          chmod +x gradlew
          ./gradlew publishBinaryReleasePublicationToGitHubPackagesRepository --no-configuration-cache
